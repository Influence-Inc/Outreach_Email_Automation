<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Influence - Creator Outreach</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Influence Outreach</div>
    <div class="auth" id="auth-status">checking auth…</div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section>
        <div class="sidebar-header">
          <h3>Brands &amp; Campaigns</h3>
          <button id="sync-btn" class="ghost small">Refresh</button>
        </div>
        <p class="hint" id="sync-status">Synced from campaigns.influence.technology</p>
        <div id="brand-tree" class="tree"></div>
      </section>
    </aside>

    <section class="main">
      <div class="main-header">
        <h2 id="campaign-title">Select a campaign</h2>
        <div id="campaign-stats" class="stats"></div>
      </div>

      <form id="creator-form" class="card" hidden>
        <h3>Add creator Instagram links</h3>
        <textarea id="ig-urls" rows="4" placeholder="Paste one or more Instagram URLs, one per line:&#10;https://www.instagram.com/username1/&#10;https://www.instagram.com/username2/" required></textarea>
        <div class="row" style="justify-content: space-between; align-items: center; margin-top: 0.5rem;">
          <p id="add-status" class="hint" style="margin: 0;">Paste one URL per line. Click "Fetch emails" after adding to look up emails.</p>
          <button type="submit">Add creators</button>
        </div>
      </form>

      <div id="creator-table-wrap" class="card" hidden>
        <div class="card-header">
          <h3>Creators</h3>
          <div class="actions">
            <button id="run-extension-btn" title="Open each profile in Chrome and scrape via the installed extension">Run via Extension</button>
            <button id="send-emails-btn">Send emails</button>
            <button id="refresh-btn" class="ghost">Refresh</button>
          </div>
        </div>
        <p id="fetch-status" class="hint" hidden></p>
        <div id="scrape-progress" class="hint" hidden>
          <span id="scrape-progress-text"></span>
          <button id="scrape-cancel-btn" class="small ghost" type="button">Cancel</button>
        </div>
        <table id="creator-table">
          <thead>
            <tr>
              <th>Instagram</th>
              <th>Name</th>
              <th>Email</th>
              <th>Status</th>
              <th>Opens</th>
              <th>Last activity</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
