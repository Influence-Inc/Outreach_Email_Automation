<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Your INFLUENCE offer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --surface-2: #faf9f6; --surface-3: #f2f0eb;
      --ink: #191817; --ink-2: #4d4b46; --muted: #8a8880; --faint: #a3a19b; --faint-2: #b4b2ac;
      --line: #e6e4de; --line-2: #dcdad3; --line-3: #eeece6;
      --accent: #191817; --accent-strong: #000000;
      --green: #147a52; --green-bg: #e7f2ec; --danger: #c53127;
      --radius: 18px; --radius-md: 12px; --radius-sm: 10px; --radius-xs: 8px;
      --shadow-card: 0 6px 24px rgba(20,18,15,.06); --shadow-btn: 0 2px 6px rgba(20,18,15,.18);
      --ring: 0 0 0 3px rgba(25,24,23,.12);
      --font: 'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font); color: var(--ink);
      background: linear-gradient(180deg, #efeee9 0%, var(--bg) 40%);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; line-height: 1.5;
      min-height: 100vh;
    }
    .num { font-variant-numeric: tabular-nums; }
    .wrap { max-width: 460px; margin: 0 auto; padding: 48px 20px 64px; }

    .brandbar { display: flex; align-items: center; justify-content: center; gap: 9px; margin-bottom: 22px;
      font-size: 13px; font-weight: 600; letter-spacing: -.01em; }
    .brandbar .mark { width: 24px; height: 24px; border-radius: 7px; background: var(--ink); color: var(--surface);
      display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }

    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow-card); overflow: hidden; }
    .card-accent { height: 5px; background: linear-gradient(90deg, var(--ink) 0%, #b4b2ac 50%, var(--ink) 100%); }
    .card-body { padding: 26px 26px 28px; }

    .eyebrow { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); }
    h1.brand { font-size: 25px; font-weight: 700; letter-spacing: -.02em; margin: 0 0 8px; }
    .lede { color: var(--ink-2); font-size: 14px; margin: 0 0 20px; }

    .terms { border: 1px solid var(--line); background: var(--surface-2); border-radius: var(--radius-md);
      padding: 18px; margin-bottom: 20px; }
    .terms .label { font-size: 11.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 9px; }
    .pill-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { background: var(--surface); border: 1px solid var(--line-2); border-radius: 999px;
      padding: 4px 12px; font-size: 12.5px; font-weight: 500; color: var(--ink); }
    .terms-foot { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
      border-top: 1px solid var(--line); margin-top: 16px; padding-top: 16px; }
    .rate { font-size: 30px; font-weight: 700; letter-spacing: -.02em; }
    .rate-cap, .by-cap { font-size: 11.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 3px; }
    .by { text-align: right; }
    .by .v { font-size: 14px; font-weight: 600; }

    .note { display: flex; gap: 9px; align-items: flex-start; background: var(--surface-3);
      border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 11px 13px; margin-bottom: 18px;
      font-size: 13.5px; color: var(--ink-2); }
    .note .spark { flex: none; }

    .btns { display: flex; flex-direction: column; gap: 9px; }
    .btn { appearance: none; border: 1px solid transparent; cursor: pointer; font-family: var(--font);
      font-weight: 600; font-size: 15px; padding: 12px 18px; border-radius: var(--radius-sm);
      transition: transform .06s, background .12s, opacity .12s; width: 100%; }
    .btn-primary { color: #fff; background: var(--accent); box-shadow: var(--shadow-btn); }
    .btn-primary:hover { background: var(--accent-strong); }
    .btn-outline { background: var(--surface); border-color: var(--line-2); color: var(--ink); }
    .btn-outline:hover { background: var(--surface-2); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sm { font-size: 13.5px; padding: 8px 13px; width: auto; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .linkbtn { appearance: none; background: none; border: 0; color: var(--muted); font-family: var(--font);
      font-size: 12.5px; cursor: pointer; padding: 4px 0; text-align: left; }
    .linkbtn:hover { color: var(--ink); }
    .center-link { display: block; margin: 6px auto 0; text-align: center; }

    .ask { font-size: 13.5px; color: var(--ink-2); margin: 0 0 4px; font-weight: 600; }
    .ask-sub { font-size: 12.5px; color: var(--muted); margin: 0 0 10px; }
    .rate-input { display: flex; gap: 8px; }
    .rate-input .box { flex: 1 1 auto; display: flex; align-items: center; gap: 4px; background: var(--surface);
      border: 1px solid var(--line-2); border-radius: var(--radius-sm); padding: 0 12px; }
    .rate-input .box:focus-within { border-color: var(--faint); box-shadow: var(--ring); }
    .rate-input .cur { color: var(--muted); font-size: 13.5px; }
    .rate-input input { border: 0; outline: none; width: 100%; font-family: var(--font); font-size: 14.5px;
      padding: 11px 2px; background: transparent; color: var(--ink); }

    .err { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 16px; }

    /* Mini contract rows */
    .crow { display: flex; justify-content: space-between; gap: 14px; padding: 9px 0;
      border-bottom: 1px solid var(--line-3); }
    .crow:last-child { border-bottom: 0; }
    .crow-l { color: var(--muted); font-weight: 600; font-size: 11px; letter-spacing: .04em;
      text-transform: uppercase; flex: none; padding-top: 2px; }
    .crow-v { color: var(--ink); text-align: right; font-weight: 500; font-size: 13.5px; }
    .crow-pills { align-items: flex-start; }
    .crow-pills .pill-list { justify-content: flex-end; }
    .sign-input { margin-bottom: 12px; }
    .sign-input input { width: 100%; font-family: var(--font); font-size: 15px; padding: 12px 13px;
      border: 1px solid var(--line-2); border-radius: var(--radius-sm); background: var(--surface); color: var(--ink); }
    .sign-input input:focus { outline: none; border-color: var(--faint); box-shadow: var(--ring); }

    /* Centered states */
    .state { text-align: center; padding: 30px 6px 14px; }
    .state .ic { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 16px; font-size: 26px; }
    .state .ic.ok { background: var(--green-bg); color: var(--green); }
    .state .ic.neutral { background: var(--surface-3); color: var(--muted); }
    .state h1 { font-size: 22px; font-weight: 700; letter-spacing: -.01em; margin: 0 0 8px; }
    .state p { color: var(--ink-2); font-size: 14px; margin: 0; }

    .spinner { width: 26px; height: 26px; border: 3px solid var(--line-2); border-top-color: var(--accent);
      border-radius: 50%; margin: 0 auto; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade { animation: fade .35s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .foot { text-align: center; color: var(--faint-2); font-size: 12px; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brandbar"><span class="mark">IN</span><span>INFLUENCE</span></div>

    <div class="card">
      <div class="card-accent"></div>
      <div class="card-body" id="card">
        <div class="state"><div class="spinner"></div></div>
      </div>
    </div>

    <p class="foot">Sent by INFLUENCE · creator collaborations</p>
  </div>

  <script src="/offer.js"></script>
</body>
</html>
